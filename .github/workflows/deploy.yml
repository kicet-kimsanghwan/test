name: 메뉴 수집 & 대시보드 배포

on:
  schedule:
    # 카카오(정담·슈마우스): 매일 10:45 KST (= 01:45 UTC)
    - cron: "0 2 * * *"
    # 네이버(4개 식당): 매주 월요일 10:30 / 11:00 / 17:00 KST
    #   = 월 01:30 / 02:00 / 08:00 UTC. 새 주간 게시물이 있을 때만 갱신.
    - cron: "30 1 * * 1"
    - cron: "10 2 * * 1"
    - cron: "0 8 * * 1"
  workflow_dispatch: {}        # 수동 실행 버튼(전체 수집)
  push:
    branches: [main]           # 코드/대시보드 변경 시 재배포
    paths-ignore:
      - "public/data/**"       # 자동 수집 커밋이 재실행을 유발하지 않도록

permissions:
  contents: write              # 수집한 데이터 커밋
  pages: write                 # GitHub Pages 배포
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # ubuntu-24.04(noble)에선 playwright 1.44가 찾는 libasound2 패키지가
    # libasound2t64로 바뀌어 --with-deps 설치가 실패함. 22.04로 고정.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: |
          pip install -r scraper/requirements.txt
          python -m playwright install --with-deps chromium

      - name: 수집 대상 결정
        id: target
        run: |
          case "${{ github.event.schedule }}" in
            "0 2 * * *")                          echo "value=kakao" >> "$GITHUB_OUTPUT" ;;
            "30 1 * * 1"|"10 2 * * 1"|"0 8 * * 1") echo "value=naver" >> "$GITHUB_OUTPUT" ;;
            *)                                    echo "value=all"   >> "$GITHUB_OUTPUT" ;;
          esac

      - name: 메뉴 스크래핑 (${{ steps.target.outputs.value }})
        run: python scraper/scrape.py ${{ steps.target.outputs.value }}
        # 일부 소스 실패해도 배포는 진행 (이전 데이터 유지)
        continue-on-error: true

      - name: 수집 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 메뉴 자동 수집 $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
