name: 메뉴 수집 & 대시보드 배포

on:
  schedule:
    # 매일 KST 11:30 (= UTC 02:30) 카카오/네이버 업로드 직후 수집
    - cron: "30 2 * * *"
  workflow_dispatch: {}        # 수동 실행 버튼
  push:
    branches: [main]           # 코드/대시보드 변경 시 재배포
    paths-ignore:
      - "public/data/**"       # 자동 수집 커밋이 재실행을 유발하지 않도록

permissions:
  contents: write              # 수집한 데이터 커밋
  pages: write                 # GitHub Pages 배포
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: |
          pip install -r scraper/requirements.txt
          python -m playwright install --with-deps chromium

      - name: 메뉴 스크래핑
        run: python scraper/scrape.py
        # 일부 소스 실패해도 배포는 진행 (이전 데이터 유지)
        continue-on-error: true

      - name: 수집 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 메뉴 자동 수집 $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
